name: Build and Validate (Fedora)

on:
  push:
    branches: [main, master]
    paths-ignore: ["**/*.md", "docs/**"]
  pull_request:
    branches: [main, master]
    paths-ignore: ["**/*.md", "docs/**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fedora:
    name: fedora-latest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build DKMS modules
        id: dkms
        uses: ./.github/actions/rpm-dkms-build
        with:
          container-image: fedora:latest
          distro-label: fedora

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fedora-dkms-logs-${{ steps.dkms.outputs.kernel_version || 'unknown' }}
          path: artifacts/fedora/logs/
          if-no-files-found: error

      - name: Upload module artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fedora-modules-${{ steps.dkms.outputs.kernel_version }}
          path: artifacts/fedora/modules/*.ko
          if-no-files-found: error

      - name: Upload DKMS packages
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fedora-dkms-packages-${{ steps.dkms.outputs.kernel_version || 'unknown' }}
          path: artifacts/fedora/packages/
          if-no-files-found: ignore
