name: Build and Validate (Fedora Silverblue)

on:
    push:
        branches: [main, master]
        paths-ignore: ["**/*.md", "docs/**"]
    pull_request:
        branches: [main, master]
        paths-ignore: ["**/*.md", "docs/**"]
    workflow_dispatch:

permissions:
    contents: read

jobs:
    silverblue:
        name: silverblue-toolbox
        runs-on: ubuntu-latest
        container:
            image: quay.io/fedora/fedora-toolbox:latest

        steps:
            - uses: actions/checkout@v4

            - name: Install dependencies and kernel headers
              shell: bash
              run: |
                  set -euo pipefail
                  KREL="$(uname -r)"

                  dnf -y install make gcc clang kmod util-linux python3 findutils which

                  if ! dnf -y install "kernel-devel-${KREL}" "kernel-headers-${KREL}"; then
                    echo "::warning::Running-kernel headers not available in toolbox container; trying generic kernel-devel/kernel-headers"
                    if ! dnf -y install kernel-devel kernel-headers; then
                      echo "::error::Missing Silverblue build headers. Use rpm-ostree install kernel-devel on host or toolbox with matching headers."
                      exit 1
                    fi
                  fi

            - name: Detect kernel headers
              id: kernel
              shell: bash
              run: |
                  set -euo pipefail
                  KDIR=""
                  if [ -d "/lib/modules/$(uname -r)/build" ]; then
                    KDIR="/lib/modules/$(uname -r)/build"
                  else
                    KDIR="$(find /usr/src/kernels -maxdepth 1 -mindepth 1 -type d | sort -V | tail -1 || true)"
                  fi

                  if [ -z "$KDIR" ] || [ ! -f "$KDIR/Makefile" ]; then
                    echo "::error::No usable kernel headers found for Silverblue/toolbox build"
                    ls -la /lib/modules || true
                    ls -la /usr/src || true
                    ls -la /usr/src/kernels || true
                    exit 1
                  fi

                  echo "kdir=$KDIR" >> "$GITHUB_OUTPUT"
                  echo "kver=$(basename "$KDIR")" >> "$GITHUB_OUTPUT"

            - name: Build modules
              id: build
              shell: bash
              run: |
                  set -euo pipefail
                  if make KERNEL_SRC="${{ steps.kernel.outputs.kdir }}" 2>&1 | tee /tmp/build.log; then
                    echo "skip=false" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  if grep -Eq '((kill_litter_super|mount_nodev|file_close_fd|zap_page_range_single).*(undefined!|undefined reference)|undefined!.*(kill_litter_super|mount_nodev|file_close_fd|zap_page_range_single))' /tmp/build.log; then
                    echo "::warning::Silverblue toolbox kernel headers lack exported symbols needed by this external module build; skipping this job as non-actionable environment mismatch"
                    echo "skip=true" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  exit 1

            - name: Build userspace tests
              if: steps.build.outputs.skip != 'true'
              shell: bash
              run: make -C test all

            - name: Runtime validation (binderfs + binder + ashmem)
              if: steps.build.outputs.skip != 'true'
              shell: bash
              continue-on-error: true
              run: make ci-test

            - name: Collect module artifacts
              if: steps.build.outputs.skip != 'true'
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p dist
                  cp ashmem/ashmem_linux.ko dist/
                  cp binder/binder_linux.ko dist/
                  if [ -f binder/binderfs.ko ]; then
                    cp binder/binderfs.ko dist/
                  fi

            - name: Upload artifacts
              if: steps.build.outputs.skip != 'true'
              uses: actions/upload-artifact@v4
              with:
                  name: silverblue-modules-${{ steps.kernel.outputs.kver }}
                  path: dist/*.ko
                  if-no-files-found: error

            - name: Report skipped environment
              if: steps.build.outputs.skip == 'true'
              shell: bash
              run: echo "Skipped silverblue-toolbox due to non-exported runner kernel symbols for external module modpost."
