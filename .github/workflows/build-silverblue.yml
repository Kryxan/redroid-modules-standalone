name: Build and Validate (Fedora Silverblue)

on:
  push:
    branches: [main, master]
    paths-ignore: ["**/*.md", "docs/**"]
  pull_request:
    branches: [main, master]
    paths-ignore: ["**/*.md", "docs/**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  silverblue:
    name: silverblue-toolbox
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build DKMS modules
        id: dkms
        uses: ./.github/actions/rpm-dkms-build
        with:
          container-image: quay.io/fedora/fedora-toolbox:latest
          distro-label: silverblue

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: silverblue-dkms-logs-${{ steps.dkms.outputs.kernel_version || 'unknown' }}
          path: artifacts/silverblue/logs/
          if-no-files-found: error

      - name: Upload module artifacts
        uses: actions/upload-artifact@v4
        with:
          name: silverblue-modules-${{ steps.dkms.outputs.kernel_version }}
          path: artifacts/silverblue/modules/*.ko
          if-no-files-found: error

      - name: Upload DKMS packages
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: silverblue-dkms-packages-${{ steps.dkms.outputs.kernel_version || 'unknown' }}
          path: artifacts/silverblue/packages/
          if-no-files-found: ignore
