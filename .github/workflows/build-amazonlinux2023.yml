name: Build and Validate (Amazon Linux 2023)

on:
  push:
    branches: [main, master]
    paths-ignore: ["**/*.md", "docs/**"]
  pull_request:
    branches: [main, master]
    paths-ignore: ["**/*.md", "docs/**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  amazonlinux2023:
    name: amazonlinux-2023-dkms
    runs-on: ubuntu-latest
    container:
      image: amazonlinux:2023

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies and kernel headers
        id: deps
        shell: bash
        run: |
          set -euo pipefail
          KREL="$(uname -r)"
          mkdir -p dist/logs dist/modules
          echo "Detected running kernel: ${KREL}" | tee dist/logs/kernel-detect.log

          dnf -y update
          dnf -y install \
            gcc \
            make \
            git \
            dkms \
            kmod \
            elfutils-libelf-devel \
            findutils \
            which \
            tar \
            gzip \
            sed

          if dnf -y install "kernel-devel-${KREL}" "kernel-headers-${KREL}"; then
            echo "matched_kernel=${KREL}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::warning::Exact kernel-devel/kernel-headers for ${KREL} are unavailable in the GitHub-hosted container environment; falling back to the latest Amazon Linux 2023 kernel packages." | tee -a dist/logs/kernel-detect.log

          if ! dnf -y install kernel-devel kernel-headers; then
            echo "::error::Unable to install usable Amazon Linux 2023 kernel-devel/kernel-headers packages" | tee -a dist/logs/kernel-detect.log
            exit 1
          fi

      - name: Detect usable kernel headers
        id: kernel
        shell: bash
        run: |
          set -euo pipefail
          RUNNING_KERNEL="$(uname -r)"
          KDIR=""
          KVER=""

          BUILD_LINK="/lib/modules/${RUNNING_KERNEL}/build"
          if [ -L "$BUILD_LINK" ] || [ -d "$BUILD_LINK" ]; then
            BUILD_TARGET="$(readlink -f "$BUILD_LINK" || true)"
            if [ -n "$BUILD_TARGET" ] && [ -f "$BUILD_TARGET/Makefile" ] && [[ "$BUILD_TARGET" == /usr/src/kernels/* ]]; then
              KDIR="$BUILD_TARGET"
              KVER="$RUNNING_KERNEL"
            fi
          fi

          if [ -z "$KDIR" ]; then
            KDIR="$(find /usr/src/kernels -maxdepth 1 -mindepth 1 -type d | sort -V | tail -n 1 || true)"
            if [ -n "$KDIR" ]; then
              KVER="$(basename "$KDIR")"
            fi
          fi

          if [ -z "$KDIR" ] || [ ! -f "$KDIR/Makefile" ]; then
            echo "::error::No usable Amazon Linux 2023 kernel headers were found" | tee -a dist/logs/kernel-detect.log
            ls -la /lib/modules || true
            ls -la /usr/src || true
            ls -la /usr/src/kernels || true
            exit 1
          fi

          mkdir -p "/lib/modules/${KVER}"
          ln -sfn "$KDIR" "/lib/modules/${KVER}/build"

          echo "Using kernel headers from ${KDIR}" | tee -a dist/logs/kernel-detect.log
          echo "kdir=$KDIR" >> "$GITHUB_OUTPUT"
          echo "kver=$KVER" >> "$GITHUB_OUTPUT"

      - name: Prepare DKMS source trees
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(cat VERSION)"
          install -m 0644 VERSION /usr/src/VERSION

          prepare_module() {
            local src_dir="$1"
            local pkg_name="$2"
            local target="/usr/src/${pkg_name}-${VERSION}"
            rm -rf "$target"
            mkdir -p "$target"
            cp -a "${src_dir}/." "$target/"
            sed -i "s/^PACKAGE_VERSION=.*/PACKAGE_VERSION=\"${VERSION}\"/" "$target/dkms.conf"
          }

          prepare_module binder redroid-binder
          prepare_module ashmem redroid-ashmem

      - name: Run DKMS build
        shell: bash
        env:
          KVER: ${{ steps.kernel.outputs.kver }}
        run: |
          set -euo pipefail
          VERSION="$(cat VERSION)"

          dkms remove -m redroid-binder -v "$VERSION" --all >/dev/null 2>&1 || true
          dkms remove -m redroid-ashmem -v "$VERSION" --all >/dev/null 2>&1 || true

          dkms add -m redroid-binder -v "$VERSION" 2>&1 | tee dist/logs/binder-dkms-add.log
          dkms add -m redroid-ashmem -v "$VERSION" 2>&1 | tee dist/logs/ashmem-dkms-add.log
          dkms build -m redroid-binder -v "$VERSION" -k "$KVER" 2>&1 | tee dist/logs/binder-dkms-build.log
          dkms build -m redroid-ashmem -v "$VERSION" -k "$KVER" 2>&1 | tee dist/logs/ashmem-dkms-build.log
          dkms status | tee dist/logs/dkms-status.log

      - name: Verify module presence
        shell: bash
        env:
          KVER: ${{ steps.kernel.outputs.kver }}
        run: |
          set -euo pipefail
          VERSION="$(cat VERSION)"
          BINDER_KO="$(find "/var/lib/dkms/redroid-binder/${VERSION}" -type f -path "*/${KVER}/*" -name 'binder_linux.ko' | sort -V | tail -n 1 || true)"
          ASHMEM_KO="$(find "/var/lib/dkms/redroid-ashmem/${VERSION}" -type f -path "*/${KVER}/*" -name 'ashmem_linux.ko' | sort -V | tail -n 1 || true)"

          if [ -z "$BINDER_KO" ] || [ ! -f "$BINDER_KO" ]; then
            echo "::error::DKMS build did not produce binder_linux.ko" | tee -a dist/logs/dkms-status.log
            find "/var/lib/dkms/redroid-binder/${VERSION}" -maxdepth 6 -type f | sort || true
            exit 1
          fi

          if [ -z "$ASHMEM_KO" ] || [ ! -f "$ASHMEM_KO" ]; then
            echo "::error::DKMS build did not produce ashmem_linux.ko" | tee -a dist/logs/dkms-status.log
            find "/var/lib/dkms/redroid-ashmem/${VERSION}" -maxdepth 6 -type f | sort || true
            exit 1
          fi

          modinfo "$BINDER_KO" | tee dist/logs/binder-modinfo.log
          modinfo "$ASHMEM_KO" | tee dist/logs/ashmem-modinfo.log

          cp "$BINDER_KO" dist/modules/binder_linux.ko
          cp "$ASHMEM_KO" dist/modules/ashmem_linux.ko

          find "/var/lib/dkms/redroid-binder/${VERSION}" -type f -name 'make.log' -exec cp -n {} dist/logs/ \; || true
          find "/var/lib/dkms/redroid-ashmem/${VERSION}" -type f -name 'make.log' -exec cp -n {} dist/logs/ \; || true

          ls -l dist/modules

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: amazonlinux2023-dkms-logs-${{ steps.kernel.outputs.kver || 'unknown' }}
          path: dist/logs/
          if-no-files-found: error

      - name: Upload module artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amazonlinux2023-modules-${{ steps.kernel.outputs.kver }}
          path: dist/modules/*.ko
          if-no-files-found: error
