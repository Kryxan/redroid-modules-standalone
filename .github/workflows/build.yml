name: Build DKMS Modules

on:
  push:
    branches: [main, master]
    paths-ignore: ["**/*.md", "docs/**"]
  pull_request:
    branches: [main, master]
    paths-ignore: ["**/*.md", "docs/**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: "${{ matrix.name }}"
    runs-on: ubuntu-latest
    container:
      image: "${{ matrix.image }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-24.04
            image: ubuntu:24.04
            headers_pkg: linux-headers-generic
            pre_install: ""
          - name: ubuntu-22.04
            image: ubuntu:22.04
            headers_pkg: linux-headers-generic
            pre_install: ""
          - name: debian-13
            image: debian:trixie
            headers_pkg: linux-headers-amd64
            pre_install: ""
          - name: debian-12
            image: debian:12
            headers_pkg: linux-headers-amd64
            pre_install: ""
          - name: proxmox-8
            image: debian:12
            headers_pkg: pve-headers
            pre_install: |
              echo 'deb [trusted=yes] http://download.proxmox.com/debian/pve bookworm pve-no-subscription' > /etc/apt/sources.list.d/pve-install-repo.list
          - name: proxmox-9
            image: debian:trixie
            headers_pkg: pve-headers
            pre_install: |
              echo 'deb [trusted=yes] http://download.proxmox.com/debian/pve trixie pve-no-subscription' > /etc/apt/sources.list.d/pve-install-repo.list

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          if [ -n "${{ matrix.pre_install }}" ]; then
            sh -ec "${{ matrix.pre_install }}"
          fi
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential clang kmod python3 util-linux \
            ${{ matrix.headers_pkg }}

      - name: Detect kernel headers
        id: kernel
        run: |
          KDIR=$(ls -d /lib/modules/*/build 2>/dev/null | sort -V | tail -1 || true)

          # In CI containers, header packages are often installed only under /usr/src.
          if [ -z "$KDIR" ]; then
            KDIR=$(find /usr/src -maxdepth 1 -type d -name 'linux-headers-*' \
              ! -name '*-common' ! -name '*-common-*' \
              | sort -V | tail -1 || true)
          fi

          if [ -z "$KDIR" ]; then
            echo "::error::No kernel headers found"
            echo "::group::Header detection diagnostics"
            echo "/lib/modules:"
            ls -la /lib/modules || true
            echo "/usr/src:"
            ls -la /usr/src || true
            echo "Installed headers packages:"
            dpkg -l 'linux-headers*' || true
            echo "::endgroup::"
            exit 1
          fi

          if [ ! -f "$KDIR/Makefile" ]; then
            echo "::error::Kernel headers directory '$KDIR' is missing Makefile"
            exit 1
          fi

          if [ "$(basename "$KDIR")" = "build" ]; then
            KVER=$(basename "$(dirname "$KDIR")")
          else
            KVER=$(basename "$KDIR" | sed 's/^linux-headers-//')
          fi

          echo "kdir=$KDIR" >> "$GITHUB_OUTPUT"
          echo "kver=$KVER" >> "$GITHUB_OUTPUT"

      - name: Build modules
        run: make KERNEL_SRC="${{ steps.kernel.outputs.kdir }}"

      - name: Verify module metadata
        run: |
          modinfo ashmem/ashmem_linux.ko
          modinfo binder/binder_linux.ko

      - name: Build userspace tests
        run: make -C test all

      - name: Runtime verify (binderfs/binder/ashmem)
        run: make ci-test

      - name: Run compatibility checks
        run: make ci-check

      - name: Upload build outputs
        uses: actions/upload-artifact@v4
        with:
          name: modules-${{ matrix.name }}-${{ steps.kernel.outputs.kver }}
          path: |
            ashmem/ashmem_linux.ko
            binder/binder_linux.ko
            test/ashmem_test
            test/binder_test
            test/test_ipc
          if-no-files-found: error
