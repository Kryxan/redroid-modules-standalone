name: Build and Validate (RHEL and CentOS Stream)

on:
  push:
    branches: [main, master]
    paths-ignore: ["**/*.md", "docs/**"]
  pull_request:
    branches: [main, master]
    paths-ignore: ["**/*.md", "docs/**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rhel-centos:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.allow_failure }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: centos-stream-8
            image: quay.io/centos/centos:stream8
            artifact_label: centos-stream-8
            allow_failure: false
          - name: centos-stream-9
            image: quay.io/centos/centos:stream9
            artifact_label: centos-stream-9
            allow_failure: false
          - name: rhel-ubi-8
            image: registry.access.redhat.com/ubi8/ubi
            artifact_label: rhel-ubi-8
            allow_failure: true
          - name: rhel-ubi-9
            image: registry.access.redhat.com/ubi9/ubi
            artifact_label: rhel-ubi-9
            allow_failure: true

    steps:
      - uses: actions/checkout@v4

      - name: Build DKMS modules
        id: dkms
        uses: ./.github/actions/rpm-dkms-build
        with:
          container-image: ${{ matrix.image }}
          distro-label: ${{ matrix.artifact_label }}

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_label }}-dkms-logs-${{ steps.dkms.outputs.kernel_version || 'unknown' }}
          path: artifacts/${{ matrix.artifact_label }}/logs/
          if-no-files-found: error

      - name: Upload module artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_label }}-modules-${{ steps.dkms.outputs.kernel_version }}
          path: artifacts/${{ matrix.artifact_label }}/modules/*.ko
          if-no-files-found: error

      - name: Upload DKMS packages
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_label }}-dkms-packages-${{ steps.dkms.outputs.kernel_version || 'unknown' }}
          path: artifacts/${{ matrix.artifact_label }}/packages/
          if-no-files-found: ignore
