# Check for new kernel releases across target distributions.
#
# Runs weekly (and on manual dispatch). Compares the latest available
# kernel-header packages against a known-good list and opens an issue
# if new versions are found.
#
# The known-good list lives in .github/kernel-versions.json.  When CI
# confirms a build against a new kernel, update that file to suppress
# future alerts.

name: Kernel Update Check

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    name: Check for new kernels
    runs-on: ubuntu-latest
    outputs:
      new_kernels: ${{ steps.check.outputs.new_kernels }}
      report: ${{ steps.check.outputs.report }}
    steps:
      - uses: actions/checkout@v4

      - name: Check distro kernel versions
        id: check
        run: |
          .github/scripts/check-kernels.sh > /tmp/kernel-report.txt 2>&1
          echo "report<<REPORT_EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/kernel-report.txt  >> "$GITHUB_OUTPUT"
          echo "REPORT_EOF"           >> "$GITHUB_OUTPUT"
          # Exit code 0 = no new kernels; 1 = new kernels found
          if grep -q '^NEW:' /tmp/kernel-report.txt; then
            echo "new_kernels=true" >> "$GITHUB_OUTPUT"
          else
            echo "new_kernels=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open issue for new kernels
        if: steps.check.outputs.new_kernels == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `New kernel headers available – ${new Date().toISOString().slice(0,10)}`;
            const body = `## Kernel Update Check\n\nNew kernel-header packages were detected.\nA build should be attempted to verify compat layer coverage.\n\n\`\`\`\n${process.env.REPORT}\n\`\`\`\n\n### Next steps\n1. Run the **Build** workflow with \`workflow_dispatch\` against the new headers.\n2. Fix any compat breakages in \`binder/compat.h\` or \`ashmem/compat.h\`.\n3. Update \`.github/kernel-versions.json\` once the build passes.\n`;
            // Avoid duplicate issues
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'kernel-update',
              per_page: 5,
            });
            if (existing.data.length > 0) {
              // Comment on the newest open issue instead
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['kernel-update'],
              });
            }
        env:
          REPORT: ${{ steps.check.outputs.report }}

  # ------------------------------------------------------------------
  # Attempt an actual build against available headers from each distro
  # ------------------------------------------------------------------
  test-build:
    name: "Test build (${{ matrix.name }})"
    needs: check
    if: needs.check.outputs.new_kernels == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Ubuntu 22.04"
            label: "ubuntu-22.04"
            image: "ubuntu:22.04"
            apt_repo: ""
          - name: "Ubuntu 24.04"
            label: "ubuntu-24.04"
            image: "ubuntu:24.04"
            apt_repo: ""
          - name: "Debian 12"
            label: "debian-12"
            image: "debian:12"
            apt_repo: ""
          - name: "Debian 13"
            label: "debian-13"
            image: "debian:trixie"
            apt_repo: ""
          - name: "Proxmox 8"
            label: "proxmox-8-pve"
            image: "debian:12"
            apt_repo: "deb [trusted=yes] http://download.proxmox.com/debian/pve bookworm pve-no-subscription"
          - name: "Proxmox 9"
            label: "proxmox-9-pve"
            image: "debian:trixie"
            apt_repo: "deb [trusted=yes] http://download.proxmox.com/debian/pve trixie pve-no-subscription"
    steps:
      - uses: actions/checkout@v4

      - name: Build DKMS modules
        id: dkms
        uses: ./.github/actions/deb-dkms-build
        with:
          container-image: ${{ matrix.image }}
          distro-label: ${{ matrix.label }}
          apt-repo: ${{ matrix.apt_repo }}

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}-dkms-logs-${{ steps.dkms.outputs.kernel_version || 'unknown' }}
          path: artifacts/${{ matrix.label }}/logs/
          if-no-files-found: error

      - name: Upload module artifacts
        if: steps.dkms.outputs.skipped != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}-modules-${{ steps.dkms.outputs.kernel_version }}
          path: artifacts/${{ matrix.label }}/modules/*.ko*
          if-no-files-found: error

      - name: Upload DKMS packages
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}-dkms-packages-${{ steps.dkms.outputs.kernel_version || 'unknown' }}
          path: artifacts/${{ matrix.label }}/packages/
          if-no-files-found: ignore

      - name: Report skipped environment
        if: steps.dkms.outputs.skipped == 'true'
        shell: bash
        run: echo "Skipped ${{ matrix.name }} due to ${{ steps.dkms.outputs.skip_reason || 'a non-actionable exact-header CI mismatch' }}."

      - name: Report
        if: always()
        shell: bash
        run: |
          echo "## Build result for ${{ matrix.name }}"
          echo "distro_id=${{ steps.dkms.outputs.distro_id || 'unknown' }}"
          echo "kernel_version=${{ steps.dkms.outputs.kernel_version || 'unknown' }}"
          echo "skipped=${{ steps.dkms.outputs.skipped || 'false' }}"
          echo "skip_reason=${{ steps.dkms.outputs.skip_reason || '' }}"
          echo "artifacts_path=${{ steps.dkms.outputs.artifacts_path || format('artifacts/{0}', matrix.label) }}"
